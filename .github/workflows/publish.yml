name: Publish to npm

on:
  push:
    branches: [ master ]
    paths:
      - 'package.json'
      - 'src/**'
      - 'tsconfig.json'
      - 'build.bun.ts'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  id-token: write

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
      version: ${{ steps.check.outputs.version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Need full history to check tags
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    
    - name: Setup Node.js for npm publish
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Check if version should be published
      id: check
      run: |
        # Get the current version from package.json
        CURRENT_VERSION=$(bun -e "console.log(require('./package.json').version)")
        echo "Current version: $CURRENT_VERSION"
        
        # Check if this version tag already exists
        if git tag -l "v$CURRENT_VERSION" | grep -q "v$CURRENT_VERSION"; then
          echo "Version v$CURRENT_VERSION already exists as git tag"
          echo "should-publish=false" >> $GITHUB_OUTPUT
        else
          echo "Version v$CURRENT_VERSION is new"
          echo "should-publish=true" >> $GITHUB_OUTPUT
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        fi

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should-publish == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest
    
    - name: Setup Node.js for npm publish
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: bun install --frozen-lockfile
    
    - name: Build project
      run: bun run build
    
    - name: Publish to npm
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [check-version, publish]
    if: success()
    
    steps:
    - name: Success notification
      run: |
        echo "✅ Successfully published @loopgrid/gitm v${{ needs.check-version.outputs.version }} to npm!"
        echo "📦 View on npm: https://www.npmjs.com/package/@loopgrid/gitm"